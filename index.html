<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Packing List</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --surface2: #0f3460;
    --accent: #e94560;
    --accent-hover: #ff6b81;
    --text: #eee;
    --text-dim: #999;
    --green: #2ecc71;
    --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
  }
  h1 { text-align: center; margin-bottom: 8px; font-size: 1.8em; }
  .subtitle { text-align: center; color: var(--text-dim); margin-bottom: 30px; font-size: 0.9em; }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 4px;
    max-width: 800px;
    margin: 0 auto 20px;
  }
  .tab {
    flex: 1;
    padding: 10px;
    background: var(--surface);
    border: none;
    color: var(--text-dim);
    font-size: 1em;
    cursor: pointer;
    border-radius: var(--radius) var(--radius) 0 0;
    transition: all 0.2s;
  }
  .tab.active {
    background: var(--surface2);
    color: var(--text);
  }

  /* Panels */
  .panel {
    display: none;
    max-width: 800px;
    margin: 0 auto;
  }
  .panel.active { display: block; }

  /* Trip Builder */
  .questions {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .question {
    background: var(--surface);
    padding: 16px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.2s;
    border: 2px solid transparent;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .question:hover { border-color: var(--surface2); }
  .question.selected { border-color: var(--accent); background: var(--surface2); }
  .question input { display: none; }
  .question .check {
    width: 24px;
    height: 24px;
    border-radius: 4px;
    border: 2px solid var(--text-dim);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .question.selected .check {
    border-color: var(--accent);
    background: var(--accent);
  }
  .question.selected .check::after {
    content: "\2713";
    color: white;
    font-weight: bold;
  }

  .task-name-row {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
  }
  .task-name-row input {
    flex: 1;
    padding: 12px 16px;
    background: var(--surface);
    border: 2px solid var(--surface2);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 1em;
  }
  .task-name-row input:focus { outline: none; border-color: var(--accent); }

  /* Preview */
  .preview {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 20px;
    max-height: 400px;
    overflow-y: auto;
  }
  .preview h3 { margin-bottom: 12px; color: var(--text-dim); font-size: 0.85em; text-transform: uppercase; letter-spacing: 1px; }
  .preview-cat { margin-bottom: 12px; }
  .preview-cat-name { font-weight: 600; margin-bottom: 4px; color: var(--accent); }
  .preview-item { padding: 2px 0 2px 16px; color: var(--text-dim); font-size: 0.9em; }
  .preview-empty { color: var(--text-dim); font-style: italic; }

  /* Buttons */
  .btn {
    padding: 14px 28px;
    border: none;
    border-radius: var(--radius);
    font-size: 1em;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary {
    background: var(--accent);
    color: white;
    width: 100%;
  }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-small {
    padding: 6px 12px;
    font-size: 0.85em;
    background: var(--surface2);
    color: var(--text);
  }
  .btn-small:hover { background: var(--accent); }
  .btn-danger { background: var(--accent); }

  /* Status */
  .status {
    text-align: center;
    margin-top: 16px;
    padding: 12px;
    border-radius: var(--radius);
    display: none;
  }
  .status.success { display: block; background: rgba(46,204,113,0.15); color: var(--green); }
  .status.error { display: block; background: rgba(233,69,96,0.15); color: var(--accent); }

  /* Editor */
  .category-card {
    background: var(--surface);
    border-radius: var(--radius);
    margin-bottom: 12px;
    overflow: hidden;
  }
  .category-header {
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    user-select: none;
  }
  .category-header:hover { background: var(--surface2); }
  .category-title { font-weight: 600; }
  .category-tags { color: var(--text-dim); font-size: 0.8em; }
  .category-body {
    display: none;
    padding: 0 16px 16px;
  }
  .category-body.open { display: block; }
  .item-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .item-row:last-child { border-bottom: none; }
  .item-text {
    flex: 1;
    background: none;
    border: none;
    color: var(--text);
    font-size: 0.95em;
    padding: 4px;
    border-bottom: 1px solid transparent;
  }
  .item-text:focus {
    outline: none;
    border-bottom-color: var(--accent);
  }
  .remove-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 1.1em;
    padding: 4px 8px;
    border-radius: 4px;
  }
  .remove-btn:hover { color: var(--accent); background: rgba(233,69,96,0.15); }

  .add-row {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }
  .add-row input {
    flex: 1;
    padding: 8px;
    background: var(--bg);
    border: 1px solid var(--surface2);
    border-radius: 4px;
    color: var(--text);
    font-size: 0.9em;
  }
  .add-row input:focus { outline: none; border-color: var(--accent); }

  .editor-actions {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  /* Tag pills */
  .tag-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .tag-pill {
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--surface2);
    background: var(--bg);
    color: var(--text-dim);
    font-size: 0.8em;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }
  .tag-pill.active {
    border-color: var(--accent);
    background: rgba(233,69,96,0.15);
    color: var(--accent);
  }

  /* Category edit form (inline) */
  .cat-edit-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 12px;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .cat-edit-row label { font-size: 0.8em; color: var(--text-dim); white-space: nowrap; }
  .cat-name-input {
    flex: 1;
    padding: 6px 8px;
    background: var(--bg);
    border: 1px solid var(--surface2);
    border-radius: 4px;
    color: var(--text);
    font-size: 0.9em;
  }
  .cat-name-input:focus { outline: none; border-color: var(--accent); }

  /* New category form */
  .new-cat-form {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
    display: none;
  }
  .new-cat-form.open { display: block; }
  .new-cat-form label { display: block; margin-bottom: 6px; font-size: 0.85em; color: var(--text-dim); }
  .new-cat-form input {
    width: 100%;
    padding: 8px;
    background: var(--bg);
    border: 1px solid var(--surface2);
    border-radius: 4px;
    color: var(--text);
    font-size: 0.9em;
    margin-bottom: 12px;
  }
  .new-cat-form input:focus { outline: none; border-color: var(--accent); }
  .new-cat-actions { display: flex; gap: 8px; }

  .cat-footer {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid rgba(255,255,255,0.05);
    display: flex;
    justify-content: flex-end;
  }

  .item-count { color: var(--text-dim); font-size: 0.85em; }

  /* Settings */
  .settings-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 16px;
  }
  .settings-card h2 { font-size: 1.1em; margin-bottom: 6px; }
  .settings-card p { color: var(--text-dim); font-size: 0.9em; margin-bottom: 16px; line-height: 1.5; }
  .settings-card a { color: var(--accent); }
  .key-row {
    display: flex;
    gap: 8px;
  }
  .key-row input {
    flex: 1;
    padding: 10px 14px;
    background: var(--bg);
    border: 2px solid var(--surface2);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 0.95em;
    font-family: monospace;
  }
  .key-row input:focus { outline: none; border-color: var(--accent); }
  .key-status { margin-top: 10px; font-size: 0.85em; }
  .key-status.set { color: var(--green); }
  .key-status.unset { color: var(--accent); }
</style>
</head>
<body>

<h1>Packing List</h1>
<p class="subtitle">Build your packing list and send it to Todoist</p>

<div class="tabs">
  <button class="tab active" onclick="switchTab('trip')">Trip Builder</button>
  <button class="tab" onclick="switchTab('editor')">Manage Items</button>
  <button class="tab" onclick="switchTab('settings')">Settings</button>
</div>

<!-- Trip Builder Panel -->
<div id="trip-panel" class="panel active">
  <div class="questions" id="questions"></div>

  <div class="task-name-row">
    <input type="text" id="task-name" value="Packing" placeholder="Task name in Todoist">
  </div>

  <div class="preview" id="preview">
    <h3>Items that will be added</h3>
    <div id="preview-list"></div>
  </div>

  <button class="btn btn-primary" id="send-btn" onclick="sendToTodoist()">
    Send to Todoist
  </button>

  <div class="status" id="status"></div>
</div>

<!-- Editor Panel -->
<div id="editor-panel" class="panel">
  <div class="editor-actions">
    <button class="btn btn-small" onclick="toggleNewCat()">+ New Category</button>
  </div>

  <div class="new-cat-form" id="new-cat-form">
    <label>Category Name</label>
    <input type="text" id="new-cat-name" placeholder="e.g. Beach Gear"
           onkeydown="if(event.key==='Enter')addCategory()">
    <label>Include when...</label>
    <div class="tag-pills" id="new-cat-tags"></div>
    <div class="new-cat-actions">
      <button class="btn btn-small" onclick="addCategory()">Add Category</button>
      <button class="btn btn-small" onclick="toggleNewCat()" style="background:var(--surface)">Cancel</button>
    </div>
  </div>

  <div id="categories-list"></div>
</div>

<!-- Settings Panel -->
<div id="settings-panel" class="panel">
  <div class="settings-card">
    <h2>Todoist API Key</h2>
    <p>
      Required to send your packing list to Todoist.<br>
      Get your key from
      <a href="https://app.todoist.com/app/settings/integrations/developer" target="_blank">
        Todoist Settings → Integrations → Developer
      </a>.
    </p>
    <div class="key-row">
      <input type="password" id="api-key-input" placeholder="Paste your API key here">
      <button class="btn btn-small" onclick="toggleKeyVis()">Show</button>
      <button class="btn btn-primary" style="width:auto" onclick="saveKey()">Save</button>
    </div>
    <div class="key-status" id="key-status"></div>
  </div>
</div>

<script>
let data = { questions: [], categories: [] };

async function loadData() {
  const resp = await fetch("/api/data");
  data = await resp.json();
  renderQuestions();
  renderPreview();
  renderEditor();
}

async function saveData() {
  await fetch("/api/data", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data),
  });
}

// --- Tabs ---
function switchTab(tab) {
  const tabs = ["trip", "editor", "settings"];
  document.querySelectorAll(".tab").forEach((t, i) => t.classList.toggle("active", tabs[i] === tab));
  tabs.forEach(t => {
    document.getElementById(`${t}-panel`).classList.toggle("active", t === tab);
  });
  if (tab === "trip") renderPreview();
  if (tab === "editor") renderEditor();
  if (tab === "settings") loadKey();
}

// --- Trip Builder ---
function renderQuestions() {
  const el = document.getElementById("questions");
  el.innerHTML = data.questions.map(q => `
    <div class="question" data-id="${q.id}" onclick="toggleQuestion('${q.id}')">
      <div class="check"></div>
      <span>${q.label}</span>
    </div>
  `).join("");
}

function getSelectedTags() {
  return [...document.querySelectorAll(".question.selected")].map(el => el.dataset.id);
}

function toggleQuestion(id) {
  const el = document.querySelector(`.question[data-id="${id}"]`);
  el.classList.toggle("selected");
  renderPreview();
}

function renderPreview() {
  const tags = getSelectedTags();
  const list = document.getElementById("preview-list");
  const matched = data.categories.filter(c =>
    c.tags.includes("always") || c.tags.some(t => tags.includes(t))
  );

  if (matched.length === 0) {
    list.innerHTML = '<div class="preview-empty">Select trip options above to see your packing list</div>';
    return;
  }

  let count = 0;
  list.innerHTML = matched.map(c => {
    count += c.items.length;
    return `
      <div class="preview-cat">
        <div class="preview-cat-name">${c.name}</div>
        ${c.items.map(i => `<div class="preview-item">${i}</div>`).join("")}
      </div>
    `;
  }).join("");

  document.getElementById("send-btn").textContent = `Send ${count} items to Todoist`;
}

async function sendToTodoist() {
  const btn = document.getElementById("send-btn");
  const status = document.getElementById("status");
  const taskName = document.getElementById("task-name").value || "Packing";
  const tags = getSelectedTags();

  btn.disabled = true;
  btn.textContent = "Sending...";
  status.className = "status";

  try {
    const resp = await fetch("/api/send", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ task_name: taskName, tags }),
    });
    const result = await resp.json();

    if (result.error) {
      status.className = "status error";
      status.textContent = `Error: ${result.error}`;
    } else {
      status.className = "status success";
      status.textContent = `Done! ${result.total} items created in your Todoist inbox.`;
    }
  } catch (e) {
    status.className = "status error";
    status.textContent = `Error: ${e.message}`;
  }

  btn.disabled = false;
  btn.textContent = "Send to Todoist";
  renderPreview();
}

// --- Editor ---
function getAllTags() {
  return ["always", ...data.questions.map(q => q.id)];
}

function renderTagPills(tags, ci) {
  // ci is category index, or null for new-cat form
  const allTags = getAllTags();
  return allTags.map(t => {
    const active = tags.includes(t) ? "active" : "";
    const onclick = ci !== null ? `toggleCatTag(${ci},'${t}')` : `toggleNewCatTag('${t}')`;
    return `<span class="tag-pill ${active}" onclick="${onclick}">${t}</span>`;
  }).join("");
}

function renderEditor() {
  const el = document.getElementById("categories-list");
  el.innerHTML = data.categories.map((cat, ci) => `
    <div class="category-card">
      <div class="category-header" onclick="toggleCat(${ci})">
        <div>
          <span class="category-title">${cat.name}</span>
          <span class="item-count">(${cat.items.length} items)</span>
        </div>
        <span class="category-tags">${cat.tags.join(", ")}</span>
      </div>
      <div class="category-body" id="cat-body-${ci}">
        <div class="cat-edit-row">
          <label>Name:</label>
          <input class="cat-name-input" value="${cat.name}"
                 onchange="updateCatName(${ci}, this.value)">
        </div>
        <div class="cat-edit-row" style="flex-wrap:wrap">
          <label>Tags:</label>
          <div class="tag-pills" style="margin-bottom:0">${renderTagPills(cat.tags, ci)}</div>
        </div>
        ${cat.items.map((item, ii) => `
          <div class="item-row">
            <input class="item-text" value="${item}" onchange="updateItem(${ci}, ${ii}, this.value)">
            <button class="remove-btn" onclick="removeItem(${ci}, ${ii})">&times;</button>
          </div>
        `).join("")}
        <div class="add-row">
          <input type="text" placeholder="Add item..." id="add-input-${ci}"
                 onkeydown="if(event.key==='Enter')addItem(${ci})">
          <button class="btn btn-small" onclick="addItem(${ci})">Add</button>
        </div>
        <div class="cat-footer">
          <button class="btn btn-small btn-danger" onclick="removeCategory(${ci})">Delete Category</button>
        </div>
      </div>
    </div>
  `).join("");

  // New category tag pills
  renderNewCatTags();
}

let newCatSelectedTags = [];

function renderNewCatTags() {
  const tagsEl = document.getElementById("new-cat-tags");
  if (!tagsEl) return;
  tagsEl.innerHTML = renderTagPills(newCatSelectedTags, null);
}

function toggleNewCatTag(tag) {
  const i = newCatSelectedTags.indexOf(tag);
  if (i >= 0) newCatSelectedTags.splice(i, 1);
  else newCatSelectedTags.push(tag);
  renderNewCatTags();
}

async function toggleCatTag(ci, tag) {
  const cat = data.categories[ci];
  const i = cat.tags.indexOf(tag);
  if (i >= 0) {
    if (cat.tags.length <= 1) return; // must have at least one tag
    cat.tags.splice(i, 1);
  } else {
    cat.tags.push(tag);
  }
  await saveData();
  renderEditor();
  document.getElementById(`cat-body-${ci}`).classList.add("open");
}

async function updateCatName(ci, val) {
  data.categories[ci].name = val;
  await saveData();
}

function toggleCat(ci) {
  document.getElementById(`cat-body-${ci}`).classList.toggle("open");
}

async function updateItem(ci, ii, val) {
  data.categories[ci].items[ii] = val;
  await saveData();
}

async function removeItem(ci, ii) {
  data.categories[ci].items.splice(ii, 1);
  await saveData();
  renderEditor();
}

async function addItem(ci) {
  const input = document.getElementById(`add-input-${ci}`);
  const val = input.value.trim();
  if (!val) return;
  data.categories[ci].items.push(val);
  input.value = "";
  await saveData();
  renderEditor();
  // Re-open the category after re-render
  document.getElementById(`cat-body-${ci}`).classList.add("open");
}

function toggleNewCat() {
  document.getElementById("new-cat-form").classList.toggle("open");
}

async function addCategory() {
  const name = document.getElementById("new-cat-name").value.trim();
  if (!name || newCatSelectedTags.length === 0) return alert("Need a name and at least one tag.");
  data.categories.push({ name, tags: [...newCatSelectedTags], items: [] });
  await saveData();
  document.getElementById("new-cat-name").value = "";
  newCatSelectedTags = [];
  document.getElementById("new-cat-form").classList.remove("open");
  renderEditor();
}

async function removeCategory(ci) {
  if (!confirm(`Delete "${data.categories[ci].name}" and all its items?`)) return;
  data.categories.splice(ci, 1);
  await saveData();
  renderEditor();
}

// --- Settings ---
async function loadKey() {
  const resp = await fetch("/api/key");
  const { set, key } = await resp.json();
  const input = document.getElementById("api-key-input");
  const status = document.getElementById("key-status");
  if (set) {
    input.value = key;
    status.className = "key-status set";
    status.textContent = "API key is saved.";
  } else {
    input.value = "";
    status.className = "key-status unset";
    status.textContent = "No API key saved yet.";
  }
}

function toggleKeyVis() {
  const input = document.getElementById("api-key-input");
  const btn = input.nextElementSibling;
  if (input.type === "password") { input.type = "text"; btn.textContent = "Hide"; }
  else { input.type = "password"; btn.textContent = "Show"; }
}

async function saveKey() {
  const key = document.getElementById("api-key-input").value.trim();
  const status = document.getElementById("key-status");
  await fetch("/api/key", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ key }),
  });
  status.className = "key-status set";
  status.textContent = key ? "API key saved." : "API key cleared.";
}

loadData();
</script>
</body>
</html>
